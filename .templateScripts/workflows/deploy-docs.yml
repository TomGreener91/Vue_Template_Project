name: Deploy Documentation

on:
  release:
    types: [published]

jobs:
  deploy-docs:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node and Build
        uses: ./.github/actions/setup-node-build
        with:
          build-command: 'npm run docs:build' # Ensure you have a docs:build script!

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs/.vitepress/dist' # Default VitePress dist directory. Update if needed.

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
