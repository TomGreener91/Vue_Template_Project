name: iOS App Build

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build iOS App
        working-directory: ./ios/App
        run: |
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -derivedDataPath build

      - name: Get Project Name
        run: echo "PROJECT_NAME=$(node -p \"require('./package.json').name\")" >> $GITHUB_ENV

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-ios-app
          path: ios/App/build/Build/Products/Debug-iphonesimulator/*.app
