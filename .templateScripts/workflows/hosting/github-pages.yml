name: Deploy Web App

on:
  pull_request:
    branches: [ "master", "main", "dev", "development" ]
  workflow_call:
    inputs:
      version:
        description: 'The version being deployed'
        required: false
        type: string
      build_command:
        description: 'The npm command to build the project'
        required: false
        default: 'npm run build'
        type: string
      dist_path:
        description: 'The directory containing the built artifacts'
        required: false
        default: './dist'
        type: string
    secrets:
      NPM_TOKEN:
        required: false

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}

      - name: Setup Node and Build Web App
        uses: ./.github/actions/setup-node-build
        with:
          build-command: ${{ inputs.build_command || 'npm run build' }}

      - name: Determine Deployment Environment
        id: deploy_env
        run: |
          if [[ "${{ inputs.version }}" =~ -dev ]]; then
            echo "env_name=staging" >> $GITHUB_OUTPUT
            echo "env_url=https://your-staging-url.com" >> $GITHUB_OUTPUT # TODO: Update with your staging URL
          else
            echo "env_name=production" >> $GITHUB_OUTPUT
            echo "env_url=https://your-production-url.com" >> $GITHUB_OUTPUT # TODO: Update with your production URL
          fi
          
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          # This is a placeholder. You would use the output from the previous step 
          # to configure different deployment targets (e.g., different buckets, servers, etc.)
          # For GitHub Pages, you might manage this with different branches or repo settings.
          # For now, we'll just log the environment.
          static_site_generator: 'vite'

      - name: Upload artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ inputs.dist_path || './dist' }}

      - name: Deploy to GitHub Pages
        if: github.event_name != 'pull_request'
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          environment: ${{ steps.deploy_env.outputs.env_name }}