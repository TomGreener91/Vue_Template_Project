name: Publish Plugin

on:
  pull_request:
    branches: [ "master", "main", "dev", "development" ]
  workflow_call:
    inputs:
      version:
        description: 'The version being released'
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: true

env:
  DEPLOY_DOCS: '{{DEPLOY_DOCS}}'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version && format('v{0}', inputs.version) || github.ref }}

      - name: Setup Node and Build
        uses: ./.github/actions/setup-node-build
        with:
          build-command: 'npm run build'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish Package (Real)
        if: github.event_name != 'pull_request' && !contains(inputs.version, '-dev')
        run: npm publish --workspace plugins/{{PLUGIN_NAME}} --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Package (Dry Run)
        if: github.event_name == 'pull_request'
        run: npm publish --workspace plugins/{{PLUGIN_NAME}} --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Deploy Docs
        if: env.DEPLOY_DOCS == 'true' && github.event_name != 'pull_request'
        uses: ./.github/actions/deploy-github-pages
        with:
          build-command: 'npm run docs:build --workspace plugins/{{PLUGIN_NAME}} --if-present'
          dist-path: './plugins/{{PLUGIN_NAME}}/docs/.vitepress/dist'
