name: CI

on:
  push:
    branches: [ "master", "main", "dev", "development" ]
  pull_request:
    branches: [ "master", "main", "dev", "development" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    # Skip CI on automated release commits to prevent infinite loops.
    # semantic-release pushes a 'chore(release): x.y.z [skip ci]' commit; this
    # provides an explicit, readable guard in addition to the [skip ci] convention.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node and Build Packages (Workspaces)
      uses: ./.github/actions/setup-node-build
      with:
        node-version: ${{ matrix.node-version }}
        build-command: 'npm run build'

    - name: Lint Code
      run: npm run lint
      
    - name: Lint Styles
      run: npm run lint:styles

    - name: Type Check
      run: npm run type-check

    - name: Run Tests
      run: npm run test --if-present

    - name: Build Root App
      run: npm run build
