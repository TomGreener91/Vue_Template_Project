name: CI

on:
  push:
    branches: [ "master", "main", "dev", "development" ]
  pull_request:
    branches: [ "master", "main", "dev", "development" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    # Skip CI on automated release commits to prevent infinite loops.
    # semantic-release pushes a 'chore(release): x.y.z [skip ci]' commit; this
    # provides an explicit, readable guard in addition to the [skip ci] convention.
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node and Build Packages (Workspaces)
      uses: ./.github/actions/setup-node-build
      with:
        node-version: ${{ matrix.node-version }}
        build-command: 'npm run build'

    - name: Lint Code
      run: npm run lint
      
    - name: Lint Styles
      run: npm run lint:styles

    - name: Type Check
      run: npm run type-check

    - name: Run Tests
      run: npm run test --if-present

    - name: Build Root App
      run: npm run build

    - name: Run Vue Doctor
      run: npx vue-doctor report --json > vue-doctor-report.json || true
      continue-on-error: true

    - name: Report Vue Doctor to PR
      if: github.event_name == 'pull_request' && matrix.node-version == '22.x'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          if (fs.existsSync('vue-doctor-report.json')) {
            try {
              const output = fs.readFileSync('vue-doctor-report.json', 'utf8');
              const jsonStr = output.substring(output.indexOf('{'), output.lastIndexOf('}') + 1);
              const results = JSON.parse(jsonStr);
              const score = results.score ? results.score.overall : 'N/A';
              const body = `## 🩺 Vue Doctor Report\n\n**Score:** ${score}\n\n<details><summary>Details</summary>\n\n\`\`\`json\n${JSON.stringify(results, null, 2).substring(0, 30000)}\n\`\`\`\n\n</details>`;

              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: body
              });
            } catch (e) {
              console.log('Error parsing vue doctor output', e);
            }
          }

    - name: NPM Health Check
      if: github.event_name == 'pull_request' && matrix.node-version == '22.x'
      run: |
        npm audit > audit.txt || true
        npm outdated > outdated.txt || true

    - name: Report Health to PR
      if: github.event_name == 'pull_request' && matrix.node-version == '22.x'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const audit = fs.existsSync('audit.txt') ? fs.readFileSync('audit.txt', 'utf8') : 'No audit results.';
          const outdated = fs.existsSync('outdated.txt') ? fs.readFileSync('outdated.txt', 'utf8') : 'No outdated results.';
          
          const truncate = (str, max) => str.length > max ? str.substring(0, max) + '\n... (truncated)' : str;
          
          const commentBody = `## 🏥 NPM Health Check Report
          
          <details>
            <summary><strong>NPM Audit Results</strong></summary>
            
            \`\`\`text
            ${truncate(audit, 30000)}
            \`\`\`
          </details>
          
          <details>
            <summary><strong>NPM Outdated Packages</strong></summary>
            
            \`\`\`text
            ${truncate(outdated, 30000)}
            \`\`\`
          </details>
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: commentBody
          });
