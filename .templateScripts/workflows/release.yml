name: Release

on:
  push:
    branches:
      - master
      - main
      - dev
      - development

jobs:
  release:
    name: Create Release
    permissions:
      contents: write
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    # Prevent this workflow from running on forks
    if: github.event.repository.fork == false
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This is required to analyze the commit history
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        env:
          # Using the default GITHUB_TOKEN is fine here because we are explicitly calling the next job
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-publish:
    name: Trigger Publish
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    # Note: The setup script will automatically replace this placeholder with the chosen template's publish workflow.
    uses: ./.github/workflows/publish-placeholder.yml
    with:
      version: ${{ needs.release.outputs.new_release_version }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}