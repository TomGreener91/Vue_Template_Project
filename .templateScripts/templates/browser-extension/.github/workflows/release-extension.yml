name: Build and Release Browser Extension

on:
  workflow_call:
    inputs:
      version:
        description: 'The version being released'
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Setup Node and Build Extension
        uses: ./.github/actions/setup-node-build
        with:
          build-command: 'npm run build'

      - name: Package Extension
        run: |
          # The output directory is 'dist'. We will create a zip file from its contents.
          cd dist
          zip -r ../extension.zip .

      - name: Determine Release Type
        id: release_type
        run: |
          if [[ "${{ inputs.version }}" =~ -dev ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "latest=false" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "latest=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload Artifact to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          files: extension.zip
          prerelease: ${{ steps.release_type.outputs.prerelease }}
          make_latest: ${{ steps.release_type.outputs.latest }}